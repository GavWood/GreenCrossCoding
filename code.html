<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <!-- Redirect to the specified URL after a 5-second delay -->
  <meta http-equiv="refresh" content="5;url=https://www.example.com/">
</head>
<body>
  <h1>Redirecting...</h1>
  <p>You will be redirected to the target page in 5 seconds. If the redirect does not work, please <a href="https://www.example.com/">click here</a>.</p>
</body>
</html>
